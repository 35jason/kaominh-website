<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang-key="page_title">OEM 產品查詢 - KAO MINH</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; color: #333; line-height: 1.6; }
        
        /* 導航列與頁尾樣式 */
        .navbar { background-color: #1a1a1a; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar .logo { color: #fff; font-size: 1.5rem; font-weight: bold; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #fff; text-decoration: none; margin-left: 20px; font-size: 1rem; transition: color 0.3s; cursor: pointer;}
        .nav-links a:hover, .nav-links a.active { color: #f0ad4e; }
        #lang-switcher { margin-left: 20px; background-color: #333; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 5px; }
        .footer { background-color: #1a1a1a; color: #fff; text-align: center; padding: 20px; font-size: 0.9rem; }
        
        /* iframe 容器樣式 (讓系統滿版顯示) */
        .iframe-container { width: 100%; height: 85vh; margin: 0; padding: 0; display: block; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">KAO MINH</div>
        <nav class="nav-links">
            <!-- 這裡的連結已經全部改成 GitHub 網頁的正確路徑 -->
            <a href="index.html" data-lang-key="nav_home">首頁</a>
            <a href="about.html" data-lang-key="nav_about">關於我們</a>
            <a href="products.html" data-lang-key="nav_products">產品中心</a>
            <a href="oem-search.html" class="active" data-lang-key="nav_oem">OEM 產品查詢</a>
            <a href="contact.html" data-lang-key="nav_contact">聯絡我們</a>
            <select id="lang-switcher">
                <option value="zh">繁體中文</option>
                <option value="vi">Tiếng Việt</option>
                <option value="en">English</option>
            </select>
        </nav>
    </header>

    <main class="iframe-container">
        <!-- ⚠️ 請將下方 src 雙引號裡面的中文字，替換成你 Google Apps Script 的網頁應用程式網址 ⚠️ -->
        <iframe src="https://script.google.com/macros/s/AKfycbxWqc3BNK4MkUBdNPgnmJ_9aKt3yks4GtncjPFRzdBfEV--ochxdazsfcpUJ9wHwdj1-g/exec"></iframe>
    </main>

    <footer class="footer">
        <p>&copy; 2026 KAO MINH CO., LTD. All Rights Reserved.</p>
        <p>No. 2 Street, Ho Nai Industrial Park, Ho Nai Ward, Dong Nai Province, Vietnam | 0251-6278666</p>
    </footer>

<script>
// 多語言資料 (只保留外層選單需要的翻譯)
const languageData = {
    "zh": { "page_title": "OEM 產品查詢 - KAO MINH", "nav_home": "首頁", "nav_about": "關於我們", "nav_products": "產品中心", "nav_oem": "OEM 產品查詢", "nav_contact": "聯絡我們" },
    "vi": { "page_title": "Tra Cứu OEM - KAO MINH", "nav_home": "Trang Chủ", "nav_about": "Về Chúng Tôi", "nav_products": "Sản Phẩm", "nav_oem": "Tra Cứu OEM", "nav_contact": "Liên Hệ" },
    "en": { "page_title": "OEM Search - KAO MINH", "nav_home": "Home", "nav_about": "About Us", "nav_products": "Products", "nav_oem": "OEM Search", "nav_contact": "Contact Us" }
};

function changeLanguage(lang) {
    document.documentElement.lang = lang === 'zh' ? 'zh-Hant' : lang;
    localStorage.setItem('preferredLanguage', lang);
    document.querySelectorAll('[data-lang-key]').forEach(el => {
        const key = el.getAttribute('data-lang-key');
        if (languageData[lang] && languageData[lang][key]) {
            el.innerHTML = languageData[lang][key];
        }
    });
}

document.addEventListener('DOMContentLoaded', () => {
    const switcher = document.getElementById('lang-switcher');
    const savedLang = localStorage.getItem('preferredLanguage') || 'zh';
    
    if(switcher) {
        switcher.value = savedLang;
        switcher.addEventListener('change', (e) => changeLanguage(e.target.value));
    }
    changeLanguage(savedLang);
});
</script>

</body>
</html>
